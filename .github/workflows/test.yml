name: Masoud Ultimate Manual Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Manual Setup Theos (No External Actions)
        run: |
          # تنصيب التوس يدوياً من المصدر الرسمي
          git clone --recursive https://github.com/theos/theos.git $THEOS
          # تحميل الـ SDK (اختياري، جيت هوب ماك بي SDKات جاهزة)
          # نضبط المسارات حتى السيرفر يشوف التوس
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Prepare Bypass Project
        run: |
          mkdir -p bypass_project
          cd bypass_project
          
          # تحميل fishhook
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c
          
          # إنشاء ملف control
          cat << 'EOF' > control
          Package: com.masoud.ultimate.bypass
          Name: ShadowBypass
          Version: 1.0.0
          Architecture: iphoneos-arm
          Maintainer: Masoud
          Author: Masoud
          Section: Tweaks
          EOF

          # إنشاء Makefile (لاحظ مسار الثيموس صار متغير)
          cat << 'EOF' > Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:12.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = ShadowBypass
          ShadowBypass_FILES = Tweak.xm fishhook.c
          ShadowBypass_CFLAGS = -fobjc-arc
          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF
          
          # إنشاء Plist الفلتر
          cat << 'EOF' > ShadowBypass.plist
          { Filter = { Bundles = ( "com.tencent.ig" ); }; }
          EOF
          
          # كود التويك مالتك (بدون تغيير)
          cat << 'EOF' > Tweak.xm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <string.h>
          #import <dlfcn.h>
          #import "fishhook.h"

          void apply_memory_patch(uint64_t ida_offset) {
              intptr_t slide = _dyld_get_image_vmaddr_slide(0);
              uintptr_t target_addr = slide + 0x100000000 + ida_offset;
              size_t page_size = sysconf(_SC_PAGESIZE);
              uintptr_t page_start = target_addr & ~(page_size - 1);
              mprotect((void*)page_start, page_size, PROT_READ | PROT_WRITE | PROT_EXEC);
              unsigned char nop_bytes[] = {0x1F, 0x20, 0x03, 0xD5};
              memcpy((void*)target_addr, nop_bytes, 4);
          }

          static void* (*original_dlsym)(void* handle, const char* symbol);
          
          void* hooked_dlsym(void* handle, const char* symbol) {
              return original_dlsym(handle, symbol);
          }

          __attribute__((constructor)) static void setup_all_bypass() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 20 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  apply_memory_patch(0x68F2720); 
                  apply_memory_patch(0x68F0BC0); 
                  apply_memory_patch(0x68F2BB8); 
                  struct rebinding rebindings[] = {
                      {"dlsym", (void *)hooked_dlsym, (void **)&original_dlsym}
                  };
                  rebind_symbols(rebindings, 1);
                  NSLog(@"[+] Masoud Bypass Active!");
              });
          }
          EOF

      - name: Compile Dylib
        run: |
          cd bypass_project
          # تشغيل البناء باستخدام المسار اليدوي
          make FINALPACKAGE=1 THEOS=$THEOS
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Dylib
          path: bypass_project/.theos/obj/*.dylib
          
